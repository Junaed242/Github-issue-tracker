<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker - Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <link rel="stylesheet" href="./tailwind.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body class=" min-h-screen">
    <header
      class="navbar bg-white border-b border-slate-100 px-4 md:px-12 py-4 flex flex-col md:flex-row items-center justify-between gap-4"
    >
      <div
        class="flex items-center gap-3 w-full md:w-auto justify-between md:justify-start"
      >
        <div class="flex items-center gap-3">
          <i class="fa-brands fa-github text-3xl text-slate-900"></i>
          <span class="text-xl font-bold text-slate-800"
            >GitHub Issues Tracker</span
          >
        </div>
      </div>

      <div
        class="flex flex-col sm:flex-row items-center gap-4 w-full md:w-auto"
      >
        <div class="relative w-full sm:w-80">
          <button
            onclick="handleSearch()"
            class="absolute left-0 h-full w-12 flex items-center justify-center z-20 group"
          >
            <i
              class="fa-solid fa-magnifying-glass text-slate-400 group-hover:text-[#631dfa]"
            ></i>
          </button>
          <input
            id="search-input"
            type="text"
            placeholder="Search issues..."
            class="input input-bordered h-11 w-full bg-slate-50 border-slate-200 pl-11 z-10 focus:outline-none"
          />
        </div>
        <button
          class="btn bg-[#631dfa] text-white border-none h-11 px-8 rounded-lg text-sm font-bold w-full sm:w-auto"
        >
          + New Issue
        </button>
      </div>
    </header>


    <script src="./main.js"></script>
  </body>
</html>
