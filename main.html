<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker - Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <link rel="stylesheet" href="./tailwind.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body class=" min-h-screen">
    <header
      class="navbar bg-white border-b px-4 md:px-12 py-4 flex flex-col md:flex-row items-center justify-between gap-4"
    >
      <div
        class="flex items-center gap-3 w-full md:w-auto justify-between md:justify-start"
      >
        <div class="flex items-center gap-3">
          <i class="fa-brands fa-github text-3xl"></i>
          <span class="text-xl font-bold"
            >GitHub Issues Tracker</span
          >
        </div>
      </div>

      <div
        class="flex flex-col sm:flex-row items-center gap-4 w-full md:w-auto"
      >
        <div class="relative w-full sm:w-80">
          <button
            onclick="handleSearch()"
            class="absolute left-0 h-full w-12 flex items-center justify-center z-20 group"
          >
            <i
              class="fa-solid fa-magnifying-glass group-hover:text-[#631dfa]"
            ></i>
          </button>
          <input
            id="search-input"
            type="text"
            placeholder="Search issues..."
            class="input input-bordered h-11 w-full bg-slate-50 pl-11 z-10 focus:outline-none"
          />
        </div>
        <button
          class="btn bg-[#631dfa] text-white border-none h-11 px-8 rounded-lg text-sm font-bold w-full sm:w-auto"
        >
          + New Issue
        </button>
      </div>
    </header>

    <main class="mx-auto p-4 md:p-8 space-y-8">
      <div
        class="bg-white p-4 md:p-6 rounded-xl shadow-sm border"
      >
        <div class="grid grid-cols-3 gap-2 md:flex md:gap-4">
          <button
            id="tab-all"
            onclick="filterIssues('all')"
            class="btn bg-[#631dfa] hover:bg-[#5215d6] text-white border-none rounded-md px-2 md:px-10 h-11  text-xs md:text-sm font-bold shadow-md w-full md:w-auto"
          >
            All
          </button>
          <button
            id="tab-open"
            onclick="filterIssues('open')"
            class="btn bg-white hover:bg-slate-50 text-slate-500 border border-slate-200 rounded-md px-2 md:px-10 h-11 text-xs md:text-sm font-semibold w-full md:w-auto"
          >
            Open
          </button>
          <button
            id="tab-closed"
            onclick="filterIssues('closed')"
            class="btn bg-white hover:bg-slate-50 text-slate-500 border  rounded-md px-2 md:px-10 h-11 text-xs md:text-sm font-semibold w-full md:w-auto"
          >
            Closed
          </button>
        </div>
      </div>
      <div
        class="bg-white p-6 md:p-8 rounded-xl border flex flex-col md:flex-row items-center justify-between gap-6"
      >
        <div
          class="flex flex-col md:flex-row items-center text-center md:text-left gap-5"
        >
          <div
            class="bg-purple-100 p-3 rounded-full text-[#631dfa] flex items-center justify-center"
          >
            <img src="./assets/Aperture.png" alt="Aperture" class="w-8 h-8" />
          </div>
          <div>
            <h2 class="text-2xl font-extrabold">
              <span id="issue-count">0</span> Issues
            </h2>
            <p class="text-slate-400 text-sm font-medium">
              Track and manage your project issues
            </p>
          </div>
        </div>

        <div class="flex gap-6 text-sm font-bold">
          <span class="flex items-center gap-2"
            ><div class="w-3 h-3 bg-emerald-500 rounded-full"></div>
            Open</span
          >
          <span class="flex items-center gap-2"
            ><div class="w-3 h-3 bg-[#631dfa] rounded-full"></div>
            Closed</span
          >
        </div>
      </div>

      <div
        id="issues-grid"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 bg-white p-8 rounded-b-xl border "
      ></div>

      <div class="relative">
        <div
          id="loading-spinner"
          class="hidden absolute inset-0 flex justify-center items-start pt-10 bg-white/50 z-50"
        >
          <span
            class="loading loading-spinner loading-lg text-[#631dfa]"
          ></span>
        </div>

        <div
          id="issues-grid"
          class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 bg-white p-8 rounded-b-xl border"
        ></div>
      </div>

      <dialog id="issue_modal" class="modal">
        <div class="modal-box max-w-2xl bg-white p-8 rounded-3xl border-none">
          <div id="modal-content"></div>
          <div class="modal-action">
            <form method="dialog">
              <button
                class="btn bg-[#631dfa] hover:bg-[#5215d6] text-white border-none outline-none focus:outline-none px-8 rounded-lg font-bold"
              >
                Close
              </button>
            </form>
          </div>
        </div>
      </dialog>

      </main>

    <script src="./main.js"></script>
  </body>
</html>
